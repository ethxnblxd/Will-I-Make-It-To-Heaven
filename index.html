    <script>
        document.addEventListener("DOMContentLoaded", () => {
            function openPopup(pageId) {
                popuptab = document.getElementsByClassName(`".${pageId}"`);

                popuptab.style.display = "block";
            }

            function openPage(pageId) {
                document.querySelectorAll(".page-section").forEach(section => {
                    section.style.display = "none";
                });

                const activePage = document.getElementById(pageId);
                if (activePage) {
                    activePage.style.display = "block";
                }

                document.querySelectorAll(".tab-btn").forEach(button => {
                    button.classList.remove("active");
                });

                const activeButton = document.querySelector(`button[data-page="${pageId}"]`);
                if (activeButton) {
                    activeButton.classList.add("active");
                }
            }

            openPage("artists");

            const defaultButton = document.querySelector('button[data-page="artists"]');
            if (defaultButton) {
                defaultButton.classList.add("active");
            }

            document.querySelectorAll('.tab-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    const pageId = e.target.getAttribute('data-page');
                    openPage(pageId);
                });
            });
        });
    </script>
